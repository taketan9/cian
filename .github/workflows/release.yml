name: release

# Builds a self-contained Windows x64 binary on a real Windows runner and
# packages it as a zip you can carry into an offline environment.
#
# Trigger it either by pushing a version tag (e.g. `git tag v0.1.0 && git push
# --tags`) or manually from the Actions tab ("Run workflow"). The zip appears
# as a workflow artifact, and is also attached to a GitHub Release for tags.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --bin cian

      - name: Stage package
        shell: pwsh
        run: |
          $stage = "cian-windows-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/release/cian.exe $stage/
          Copy-Item packaging/windows/install.ps1 $stage/
          Copy-Item packaging/windows/README.txt $stage/
          New-Item -ItemType Directory -Force -Path "$stage/examples" | Out-Null
          Copy-Item examples/init.lua "$stage/examples/"
          Compress-Archive -Path "$stage/*" -DestinationPath "cian-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cian-windows-x64
          path: cian-windows-x64.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cian-windows-x64.zip
